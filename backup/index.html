<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Parisa</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#222937;
      --frame:#222937;
      --panel:#0f1623;
      --ink:#c9d1d9;
      --angle:#58a6ff;
      --tag:#7ee787;
      --attr:#79c0ff;
      --val:#e6cc77;
      --comment:#8b949e;
    }

    *{ box-sizing:border-box; }

    html,body{
      height:100vh;
      margin:0;
      overflow:hidden;
      background:var(--bg);
      font-family:Arial, sans-serif;
    }

    body.intro-active{
      overflow:hidden;
    }

    .intro{
      position:fixed;
      inset:0;
      background:var(--bg);
      z-index:9999;
      opacity:1;
      transition:opacity .35s ease;
    }

    .intro.fade-out{
      opacity:0;
      pointer-events:none;
    }

    #mainUI{
      opacity:0;
      padding-top:18px;
      height:100vh;
      overflow:hidden;
    }

    #mainUI.ui-ready{
      opacity:1;
      transition:opacity .35s ease;
    }

    .intro canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    nav{
      width:100%;
      background:#1b2231;
      border-bottom:1px solid rgba(255,255,255,0.12);
      padding:14px 32px;
      display:flex;
      justify-content:center;
      gap:40px;
      font-size:1rem;
      font-weight:500;
      font-family:"Comic Sans MS","Comic Neue",cursive;
    }

    nav a{
      color:rgba(255,255,255,0.85);
      text-decoration:none;
      transition:color .2s, opacity .2s;
      opacity:0.9;
    }

    nav a:hover{
      color:#ffffff;
      opacity:1;
    }

    .frame{
      width:min(1700px,97vw);
      height:calc(100vh - 110px);
      margin:12px auto 0;
      border:2px solid var(--frame);
      border-radius:28px;
      padding:32px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#222937;
      overflow:hidden;
    }

    .terminal{
      position:relative;
      width:min(1050px, 90vw);
      background:linear-gradient(180deg,#0f172a 0%, var(--panel) 100%);
      border:1px solid #1f2937;
      border-radius:28px;
      box-shadow:0 20px 45px rgba(0,0,0,.22);
      padding:20px 24px;
      height:min(72vh,720px);
      overflow:auto;
      opacity:0;
      transform:translateY(8px);
      transition:opacity .45s ease, transform .45s ease;
    }

    .terminal.show{
      opacity:1;
      transform:translateY(0);
    }

    .dots{
      display:flex;
      gap:8px;
      margin-bottom:10px;
    }

    .dots i{
      width:12px;
      height:12px;
      border-radius:50%;
      display:inline-block;
      opacity:.95;
    }

    .dots i:nth-child(1){ background:#ff5f56; }
    .dots i:nth-child(2){ background:#ffbd2e; }
    .dots i:nth-child(3){ background:#27c93f; }

    .code{
      font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
      font-size:clamp(12px, 1vw, 15px);
      line-height:1.75;
      white-space:pre-wrap;
      overflow-wrap:break-word;
      word-break:normal;
      color:var(--ink);
      max-width: 100%;
    }
    .code .line{ white-space:pre-wrap; }

    .angle{ color:var(--angle); }
    .tag{ color:var(--tag); }
    .attr{ color:var(--attr); }
    .val{ color:var(--val); }
    .comment{ color:var(--comment); font-style:italic; }

    @media (max-width: 980px){
      .frame{
        height:auto;
        padding:24px 16px;
      }

      .terminal{
        width:100%;
        height:56vh;
      }
    }
  </style>
</head>
<body class="intro-active">

  <div id="intro" class="intro">
    <canvas id="introCanvas"></canvas>
  </div>

  <div id="mainUI">
    <nav>
      <a href="about.html">About</a>
      <a href="#coding">Coding</a>
      <a href="#music">Music</a>
      <a href="#photos">Photos</a>
      <a href="#learning">Learning</a>
    </nav>

    <div class="frame">
      <div class="terminal" id="terminalBox">
        <div class="dots"><i></i><i></i><i></i></div>
        <pre id="term" class="code"></pre>
      </div>
    </div>
  </div>

  <script>
    /********************
     * RIGHT: terminal typing
     ********************/
    const term = document.getElementById('term');
    const terminalBox = document.getElementById('terminalBox');

    const lines = [
      "<html>",
      "  <body>",
      "    <!-- Hi, I'm Parisa. This is my space on the web. -->",
      "",
      "    <h1>Welcome</h1>",
      "",
      "    <p class=\"intro\">",
      "      I’m a software engineer with a focus on cloud technologies, AWS, and DevOps.",
      "    </p>",
      "",
      "    <p>",
      "      Studied Computer Science at Vanderbilt University and still learning every day.",
      "    </p>",
      "",
      "    <section id=\"about\">",
      "      Outside work: cats, abstract art, resin crafts, and following new tech and AI trends.",
      "    </section>",
      "",
      "    <section id=\"coding\">",
      "      This is where I’ll post code snippets, side projects, and notes on things I build or experiment with.",
      "    </section>",
      "",
      "    <section id=\"music\">",
      "      Some of the music that keeps me focused or helps me unwind.",
      "    </section>",
      "",
      "    <section id=\"photos\">",
      "      Photos from daily life, travels, and the occasional cat cameo.",
      "    </section>",
      "",
      "    <section id=\"learning\">",
      "      Short notes and takeaways from what I read, study, or try out.",
      "    </section>",
      "",
      "  </body>",
      "</html>"
    ];

    let li = 0;
    let ci = 0;
    let typerStarted = false;
    const typeSpeed = 18;
    const lineDelay = 260;

    function highlight(s){
      let e = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      if (/&lt;!--.*--&gt;/.test(e)) {
        return `<span class="comment">${e}</span>`;
      }

      e = e.replace(/(&lt;\/?)([a-zA-Z0-9-]+)\s*([^&]*?)(&gt;)/g,
        (m, open, tag, attrs, close) => {
          const attrsHL = attrs.replace(
            /([a-zA-Z_:.-]+)(=)("[^"]*"|'[^']*')/g,
            `<span class="attr">$1</span>$2<span class="val">$3</span>`
          ).trim();

          return `<span class="angle">${open}</span><span class="tag">${tag}</span>${attrsHL ? ' ' + attrsHL : ''}<span class="angle">${close}</span>`;
        }
      );

      return e;
    }

    function typeNext(){
      if (li >= lines.length) return;

      if (ci === 0){
        const line = document.createElement('div');
        line.className = 'line';
        term.appendChild(line);
      }

      const current = term.querySelectorAll('.line')[li];
      const text = lines[li];
      current.innerHTML = highlight(text.substring(0, ci + 1));
      ci++;
      term.scrollTop = term.scrollHeight;

      if (ci < text.length) {
        setTimeout(typeNext, typeSpeed);
      } else {
        ci = 0;
        li++;
        setTimeout(typeNext, lineDelay);
      }
    }

    function startTyper(){
      if (typerStarted) return;
      typerStarted = true;
      terminalBox.classList.add('show');
      typeNext();
    }

    /********************
     * INTRO: fullscreen binary rain only
     ********************/
    const body = document.body;
    const intro = document.getElementById('intro');
    const mainUI = document.getElementById('mainUI');
    const introCanvas = document.getElementById('introCanvas');
    const ctx = introCanvas.getContext('2d');

    const PALETTE = ['#8b5cf6', '#3b82f6', '#ffffff'];
    const pickColor = i => PALETTE[i % PALETTE.length];

    let fontSize = 18;
    let columns = 0;
    let drops = [];
    let frame = 0;
    let rainIntensity = 1;
    let introFinished = false;

    function fitIntroCanvas(){
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth;
      const h = window.innerHeight;
      introCanvas.width = Math.floor(w * dpr);
      introCanvas.height = Math.floor(h * dpr);
      introCanvas.style.width = w + 'px';
      introCanvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function setupRain(){
      columns = Math.max(12, Math.floor(window.innerWidth / fontSize));
      drops = Array.from({ length: columns }, () => Math.random() * -(window.innerHeight / fontSize));
    }

    function drawRain(){
      ctx.fillStyle = 'rgba(34, 41, 55, 0.14)';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.font = `${fontSize}px ui-monospace, Menlo, Consolas, monospace`;

      let activeCols = 0;

      for (let i = 0; i < columns; i++){
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        if (drops[i] > -30) {
          ctx.globalAlpha = 0.82;
          ctx.fillStyle = pickColor(i + frame);
          ctx.fillText(Math.random() < 0.5 ? '0' : '1', x, y);
          activeCols++;
        }

        drops[i] += 2.0;

        if (y > window.innerHeight) {
          if (Math.random() < rainIntensity) {
            drops[i] = Math.random() * -18;
          } else {
            drops[i] = -9999;
          }
        }
      }

      ctx.globalAlpha = 1;
      return activeCols;
    }

    function finishIntro(){
      if (introFinished) return;
      introFinished = true;

      mainUI.classList.add('ui-ready');
      body.classList.remove('intro-active');
      intro.remove();

      startTyper();
    }

    function introLoop(){
      frame++;
      const activeCols = drawRain();

      if (frame > 24) {
        rainIntensity *= 0.972;
      }

      if (rainIntensity < 0.04 || activeCols === 0) {
        finishIntro();
        return;
      }

      requestAnimationFrame(introLoop);
    }

    function handleResize(){
      fitIntroCanvas();
      setupRain();
    }

    window.addEventListener('resize', handleResize);

    (function init(){
      handleResize();
      introLoop();
    })();
  </script>
</body>
</html>
