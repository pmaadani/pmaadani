name: Test AWS OIDC

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test-aws:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Confirm AWS identity
        run: aws sts get-caller-identity

      - name: Confirm S3 access
        run: aws s3 ls "s3://${{ vars.S3_BUCKET }}"
        
      - name: Test S3 write access
        run: |
          echo "GitHub Actions write test" > github-actions-test.txt
          aws s3 cp github-actions-test.txt "s3://${{ vars.S3_BUCKET }}/github-actions-test.txt"